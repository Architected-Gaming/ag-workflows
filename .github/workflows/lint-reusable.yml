name: Lint (Reusable)

on:
  workflow_call:
    secrets:
      DISCORD_LINT_WEBHOOK:
        required: false
      DISCORD_LINT_ERRORS_WEBHOOK:
        required: false
      LINT_WEBHOOK_SECRET:
        required: false

jobs:
  lint:
    name: Lint Resource
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # AG [I] 04APR26 - UPDATE - Exclude non-lintable files before lint
      - name: Exclude Non-Lintable Files
        run: |
          fxap=0
          ignore=0

          # 1. Remove FXAP-encrypted files (magic bytes 0x46584150)
          find . -name '*.lua' -not -path './.git/*' | while IFS= read -r f; do
            header=$(head -c4 "$f" | od -An -tx1 | tr -d ' \n')
            if [ "$header" = "46584150" ]; then
              rm -f "$f"
              fxap=$((fxap + 1))
            fi
          done

          # 2. Honor per-repo .lintignore (one glob pattern per line)
          #    Add non-code .lua files here (install snippets, READMEs, etc.)
          if [ -f .lintignore ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              line=$(echo "$line" | sed 's/#.*//' | xargs)
              [ -z "$line" ] && continue
              for f in $(find . -not -path './.git/*' -path "./$line" 2>/dev/null); do
                rm -f "$f"
                ignore=$((ignore + 1))
              done
            done < .lintignore
          fi

          echo "Excluded: $fxap FXAP, $ignore .lintignore"
      # AG UPDATE END

      - name: Lint
        uses: iLLeniumStudios/fivem-lua-lint-action@v2
        with:
          capture: "junit.xml"
          args: "-t --ignore 1 2 3 4 5 6 --formatter JUnit"
          extra_libs: ox_lib+mysql+qblocales+qbox+qbox_playerdata+qbox_lib

      - name: Generate Lint Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        continue-on-error: true
        with:
          report_paths: "**/junit.xml"
          check_name: Linting Report
          fail_on_failure: true

      - name: Discord Notification
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_LINT_WEBHOOK }}
          ERRORS_WEBHOOK_URL: ${{ secrets.DISCORD_LINT_ERRORS_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, urllib.request, xml.etree.ElementTree as ET

          webhook = os.environ.get("WEBHOOK_URL", "")
          errors_webhook = os.environ.get("ERRORS_WEBHOOK_URL", "")

          job_status = os.environ["JOB_STATUS"]
          repo = os.environ["REPO"]
          branch = os.environ["BRANCH"]
          sha = os.environ["SHA"]
          actor = os.environ["ACTOR"]
          run_id = os.environ["RUN_ID"]
          short_sha = sha[:7]

          # AG [I] 04APR26 - UPDATE - Parse both <failure> (lint) and <error> (syntax) elements
          # luacheck JUnit formatter uses <failure> for lint warnings/errors and
          # <error> for fatal errors like syntax errors (F2 code)
          lua_error_re = re.compile(r'\S+\.lua:\d+:\d+:')

          passed = 0
          failed = 0
          errors = []
          try:
              tree = ET.parse("junit.xml")
              for tc in tree.iter("testcase"):
                  # Check both <failure> (lint issues) and <error> (syntax errors)
                  issue = tc.find("failure")
                  if issue is None:
                      issue = tc.find("error")
                  if issue is not None:
                      failed += 1
                      classname = tc.get("classname", "")
                      msg = issue.get("message", "") or (issue.text or "lint error")
                      if len(msg) > 200:
                          msg = msg[:200] + "..."
                      errors.append(f"\u2022 `{classname}`: {msg}")
                  else:
                      passed += 1
          except (FileNotFoundError, ET.ParseError):
              pass

          # Fallback: if job failed but JUnit found nothing, try raw text
          if not errors and job_status != "success":
              try:
                  with open("junit.xml", "r", errors="replace") as jf:
                      for line in jf:
                          line = line.strip()
                          if lua_error_re.search(line):
                              if len(line) > 200:
                                  line = line[:200] + "..."
                              errors.append(f"\u2022 `{line}`")
                              failed += 1
              except FileNotFoundError:
                  pass
              if not errors:
                  errors.append(f"\u2022 Lint failed \u2014 check the [workflow run](https://github.com/{repo}/actions/runs/{run_id}) for details")
                  failed = 1

          # Build description
          if job_status == "success":
              color = 3066993   # green
              status = "\u2705 Passed"
          else:
              color = 15158332  # red
              status = "\u274c Failed"

          lines = [
              f"{status}\n",
              f"**Tests:** {passed} passed" + (f", {failed} failed" if failed else ""),
              f"**Branch:** `{branch}`",
              f"**Commit:** [`{short_sha}`](https://github.com/{repo}/commit/{sha})",
              f"**By:** {actor}",
          ]

          if errors:
              lines.append("")
              lines.append("**Errors:**")
              lines.extend(errors[:10])
              if len(errors) > 10:
                  lines.append(f"... and {len(errors) - 10} more")
              lines.append("")
              lines.append("*False positive? Add a `.lintignore` file to the repo root listing files to skip (one per line).*")

          desc = "\n".join(lines)

          if len(desc) > 4000:
              desc = desc[:4000] + "\n... (truncated)"

          payload = json.dumps({
              "embeds": [{
                  "title": f"Lint \u2014 {repo}",
                  "description": desc,
                  "color": color,
                  "url": f"https://github.com/{repo}/actions/runs/{run_id}"
              }]
          })

          # AG [I] 04APR26 - UPDATE - DISCORD_LINT_WEBHOOK fires on all runs, ERRORS_WEBHOOK on failures only
          def send(wh_url):
              if not wh_url:
                  return
              req = urllib.request.Request(
                  wh_url,
                  data=payload.encode(),
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "AG-Lint-Bot/1.0"
                  },
                  method="POST"
              )
              try:
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print(f"::warning::Discord webhook failed: {e}")

          # Main webhook: every run (pass + fail)
          send(webhook)
          # Errors webhook: failures only (JUnit count OR job-level failure as fallback)
          if failed > 0 or job_status == "failure":
              send(errors_webhook)
          # AG UPDATE END
          PYEOF

      # AG [I] 05APR26 - UPDATE - Report lint result to Tetra hub for dashboard badges
      - name: Report to Tetra
        if: always()
        env:
          TETRA_WEBHOOK_SECRET: ${{ secrets.LINT_WEBHOOK_SECRET }}
        run: |
          [ -z "$TETRA_WEBHOOK_SECRET" ] && exit 0

          # Determine status from junit.xml
          STATUS="pass"
          ERROR_COUNT=0
          if [ -f junit.xml ]; then
            ERROR_COUNT=$(python3 -c "
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse('junit.xml')
              count = sum(1 for tc in tree.iter('testcase') if tc.find('failure') is not None or tc.find('error') is not None)
              print(count)
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
            if [ "$ERROR_COUNT" -gt 0 ]; then
              STATUS="fail"
            fi
          fi

          # Build errors array from junit.xml
          ERRORS="[]"
          if [ "$STATUS" = "fail" ] && [ -f junit.xml ]; then
            ERRORS=$(python3 -c "
          import xml.etree.ElementTree as ET, json, sys
          try:
              tree = ET.parse('junit.xml')
              errs = []
              for tc in tree.iter('testcase'):
                  issue = tc.find('failure')
                  if issue is None:
                      issue = tc.find('error')
                  if issue is not None:
                      name = tc.get('classname', tc.get('name', ''))
                      msg = (issue.get('message', '') or (issue.text or '')).strip()
                      parts = name.split(':')
                      errs.append({
                          'file': parts[0] if parts else name,
                          'line': int(parts[1]) if len(parts) > 1 and parts[1].isdigit() else 0,
                          'col':  int(parts[2]) if len(parts) > 2 and parts[2].isdigit() else 0,
                          'message': msg[:200]
                      })
              print(json.dumps(errs))
          except Exception:
              print('[]')
          " 2>/dev/null || echo "[]")
          fi

          # Build and sign payload
          PAYLOAD=$(jq -n \
            --arg repo "${{ github.event.repository.name }}" \
            --arg org "${{ github.repository_owner }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg status "$STATUS" \
            --argjson error_count "$ERROR_COUNT" \
            --argjson errors "$ERRORS" \
            --arg actor "${{ github.actor }}" \
            --arg commit_sha "${{ github.sha }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson timestamp "$(date +%s)" \
            '{repo: $repo, org: $org, branch: $branch, status: $status, error_count: $error_count, errors: $errors, actor: $actor, commit_sha: $commit_sha, run_url: $run_url, timestamp: $timestamp}')

          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$TETRA_WEBHOOK_SECRET" | awk '{print $2}')"
          curl -sf -X POST "https://aghub.tech77.net:9443/api/git-ops/lint/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Tetra-Signature: $SIGNATURE" \
            -d "$PAYLOAD" \
            --max-time 10 || true
      # AG UPDATE END
